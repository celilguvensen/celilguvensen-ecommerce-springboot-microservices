worker_processes 1;

events { 
    worker_connections 1024; 
}

http {
     
    init_by_lua_block {
		jwt_secret = os.getenv("JWT_SECRET") or "default-secret-key"
    }

     
    lua_shared_dict jwt_cache 10m;
    
    server {
        listen 80;
        server_name localhost;

         
        location = /auth-check {
            internal;
            access_by_lua_block {
                local jwt = require "resty.jwt"
                
                -- Authorization header'dan token al
                local auth_header = ngx.var.http_authorization
                if not auth_header then
                    ngx.log(ngx.ERR, "No Authorization header")
                    ngx.status = 401
                    ngx.say("Missing Authorization header")
                    ngx.exit(401)
                end
                
                -- Bearer prefix'ini kaldır
                local token = auth_header:match("Bearer%s+(.+)")
                if not token then
                    ngx.log(ngx.ERR, "Invalid Authorization header format")
                    ngx.status = 401
                    ngx.say("Invalid Authorization header format")
                    ngx.exit(401)
                end
                
                -- JWT'yi verify et
                local jwt_obj = jwt:verify(jwt_secret, token)
                if not jwt_obj.valid then
                    ngx.log(ngx.ERR, "Invalid JWT token: ", jwt_obj.reason)
                    ngx.status = 401
                    ngx.say("Invalid token")
                    ngx.exit(401)
                end
                
                -- User bilgilerini response header'larına ekle
                local payload = jwt_obj.payload
                ngx.header["X-User-ID"] = payload.userId or ""
                ngx.header["X-Username"] = payload.sub or ""
                ngx.header["X-User-Role"] = payload.role or ""
                ngx.header["X-User-Email"] = payload.email or ""
            }
        }
		
         
        location /uploads/ {
            alias /uploads/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            expires 30d;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

         
        location /api/auth {
            proxy_pass http://host.docker.internal:8085/api/auth;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================
        # ADMIN ONLY - Categories Management
        # ============================================
        location ~ ^/api/admin/categories {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:5173';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
                add_header 'Access-Control-Max-Age' 3600;
                return 204;
            }
            
            access_by_lua_block {
                local jwt = require "resty.jwt"
                local auth_header = ngx.var.http_authorization
                
                if not auth_header then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"Missing Authorization header"}')
                    ngx.exit(401)
                end
                
                local token = auth_header:match("Bearer%s+(.+)")
                if not token then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"Invalid Authorization header format"}')
                    ngx.exit(401)
                end
                
                local jwt_obj = jwt:verify(jwt_secret, token)
                if not jwt_obj.valid then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"Invalid token"}')
                    ngx.exit(401)
                end
                
                local payload = jwt_obj.payload
                local role = payload.role or ""
                
                if role ~= "ADMIN" then
                    ngx.status = 403
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"Access denied. Admin role required"}')
                    ngx.exit(403)
                end
                
                ngx.req.set_header("X-User-ID", payload.userId or "")
                ngx.req.set_header("X-Username", payload.sub or "")
                ngx.req.set_header("X-User-Role", role)
                ngx.req.set_header("X-User-Email", payload.email or "")
            }
            
            rewrite ^/api/admin/categories(.*)$ /api/categories$1 break;
            proxy_pass http://host.docker.internal:8081;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        }

